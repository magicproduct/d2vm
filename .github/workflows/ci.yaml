name: Tests and Build

on:
  push:
    branches: [ "*" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: chainguard-actions/actions-checkout@d1f1061cdaee56aa3a3bc3deb86b67b1db772dd6 # v6.0.2
      with:
        # fetching all tags is required for the Makefile to compute the right version
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Go
      uses: chainguard-actions/actions-setup-go@a5e8c9530cdd8d86c8c1e22fe4e2d0668896f7c7 # v6.5.0
      with:
        go-version: "1.20"
        cache: false

    - name: Set up QEMU dependency
      uses: chainguard-actions/docker-setup-qemu-action@be526888acc63b74559c57bb8b34a420f2a24670 # v4.1.0

    - name: Set up Docker Buildx
      uses: chainguard-actions/docker-setup-buildx-action@b6beb8a80a92c55017146dc002f047479d776a98 # v4.1.0

    - name: Setup dependencies
      run: sudo apt update && sudo apt install -y util-linux udev parted e2fsprogs mount tar extlinux qemu-utils qemu-system

    - name: Share cache with other actions
      uses: chainguard-actions/actions-cache@f3b0db6485760961932c26cc9cf35a6a91a2c63e # v6.1.0
      with:
        path: |
          ~/go/pkg/mod
          /tmp/.buildx-cache
        key: ${{ runner.os }}-tests-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-tests-
        lookup-only: true

    - name: Run linter
      run: make vet

    - name: Run tests
      run: git --no-pager diff --exit-code HEAD~1 HEAD **/**.go templates/ || make tests

  templates-tests:
    name: Test Templates
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
        - ubuntu
        - debian
        - kalilinux
        - alpine
        - centos
        - quay.io/centos/centos:stream9

    steps:
    - name: Checkout
      uses: chainguard-actions/actions-checkout@d1f1061cdaee56aa3a3bc3deb86b67b1db772dd6 # v6.0.2
      with:
        # fetching all tags is required for the Makefile to compute the right version
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Go
      uses: chainguard-actions/actions-setup-go@a5e8c9530cdd8d86c8c1e22fe4e2d0668896f7c7 # v6.5.0
      with:
        go-version: "1.20"
        cache: false

    - name: Set up QEMU dependency
      uses: chainguard-actions/docker-setup-qemu-action@be526888acc63b74559c57bb8b34a420f2a24670 # v4.1.0

    - name: Set up Docker Buildx
      uses: chainguard-actions/docker-setup-buildx-action@b6beb8a80a92c55017146dc002f047479d776a98 # v4.1.0

    - name: Setup dependencies
      run: sudo apt update && sudo apt install -y util-linux udev parted e2fsprogs mount tar extlinux qemu-utils qemu-system

    - name: Share cache with other actions
      uses: chainguard-actions/actions-cache@f3b0db6485760961932c26cc9cf35a6a91a2c63e # v6.1.0
      with:
        path: |
          ~/go/pkg/mod
          /tmp/.buildx-cache
        key: ${{ runner.os }}-tests-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-tests-
        lookup-only: true

    - name: Run tests
      env:
        MATRIX_IMAGE: ${{ matrix.image }}
      run: git --no-pager diff --exit-code HEAD~1 HEAD **/**.go templates/ || IMAGE="${MATRIX_IMAGE}" make test-templates


  e2e-tests:
    name: End to end Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
        - ubuntu:22.04
        - debian:11
    steps:
    - name: Checkout
      uses: chainguard-actions/actions-checkout@d1f1061cdaee56aa3a3bc3deb86b67b1db772dd6 # v6.0.2
      with:
        # fetching all tags is required for the Makefile to compute the right version
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Go
      uses: chainguard-actions/actions-setup-go@a5e8c9530cdd8d86c8c1e22fe4e2d0668896f7c7 # v6.5.0
      with:
        go-version: "1.20"
        cache: false

    - name: Set up QEMU dependency
      uses: chainguard-actions/docker-setup-qemu-action@be526888acc63b74559c57bb8b34a420f2a24670 # v4.1.0

    - name: Set up Docker Buildx
      uses: chainguard-actions/docker-setup-buildx-action@b6beb8a80a92c55017146dc002f047479d776a98 # v4.1.0

    - name: Setup dependencies
      run: sudo apt update && sudo apt install -y util-linux udev parted e2fsprogs mount tar extlinux qemu-utils qemu-system ovmf

    - name: Share cache with other actions
      uses: chainguard-actions/actions-cache@f3b0db6485760961932c26cc9cf35a6a91a2c63e # v6.1.0
      with:
        path: |
          ~/go/pkg/mod
          /tmp/.buildx-cache
        key: ${{ runner.os }}-e2e-tests-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-tests-
        lookup-only: true

    - name: Run end-to-end tests
      env:
        MATRIX_IMAGE: ${{ matrix.image }}
      run: E2E_IMAGES="${MATRIX_IMAGE}" make e2e

  docs-up-to-date:
    name: Docs up to date
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: chainguard-actions/actions-checkout@d1f1061cdaee56aa3a3bc3deb86b67b1db772dd6 # v6.0.2
      with:
        # fetching all tags is required for the Makefile to compute the right version
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Go
      uses: chainguard-actions/actions-setup-go@a5e8c9530cdd8d86c8c1e22fe4e2d0668896f7c7 # v6.5.0
      with:
        go-version: "1.20"
        cache: false

    - name: Share cache with other actions
      uses: chainguard-actions/actions-cache@f3b0db6485760961932c26cc9cf35a6a91a2c63e # v6.1.0
      with:
        path: |
          ~/go/pkg/mod
          /tmp/.buildx-cache
        key: ${{ runner.os }}-tests-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-tests-
        lookup-only: true

    - name: Check if docs are up to date
      run: make docs-up-to-date

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: chainguard-actions/actions-checkout@d1f1061cdaee56aa3a3bc3deb86b67b1db772dd6 # v6.0.2
      with:
        # fetching all tags is required for the Makefile to compute the right version
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Go
      uses: chainguard-actions/actions-setup-go@a5e8c9530cdd8d86c8c1e22fe4e2d0668896f7c7 # v6.5.0
      with:
        go-version: "1.20"
        cache: false

    - name: Set up QEMU dependency
      uses: chainguard-actions/docker-setup-qemu-action@be526888acc63b74559c57bb8b34a420f2a24670 # v4.1.0

    - name: Set up Docker Buildx
      uses: chainguard-actions/docker-setup-buildx-action@b6beb8a80a92c55017146dc002f047479d776a98 # v4.1.0

    - name: Login to Docker Hub
      uses: chainguard-actions/docker-login-action@2ec1a61ac7d5854002f4e3df1f32cc1d02994f76 # v4.2.0
      if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Share cache with other actions
      uses: chainguard-actions/actions-cache@f3b0db6485760961932c26cc9cf35a6a91a2c63e # v6.1.0
      with:
        path: |
          ~/go/pkg/mod
          /tmp/.buildx-cache
        key: ${{ runner.os }}-build-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-build-
        lookup-only: true

    - name: Ensure all files were well formatted
      run: make check-fmt

    - name: Import GPG key
      id: import_gpg
      uses: step-security/ghaction-import-gpg@c0b4a334b9b72bfaaebec86ef022a78a5b17f828 # v7.0.0
      if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
      with:
        gpg_private_key: ${{ secrets.GPG_KEY }}
        passphrase: ${{ secrets.GPG_PASSWORD }}

    - name: Build Snapshot
      run: make build-snapshot

    - name: Release Snapshot
      if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
      env:
        GITHUB_TOKEN: ${{ secrets.REPOSITORIES_ACCESS_TOKEN }}
        GPG_PASSWORD: ${{ secrets.GPG_PASSWORD }}
        GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
      run: make release-snapshot

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: chainguard-actions/actions-checkout@d1f1061cdaee56aa3a3bc3deb86b67b1db772dd6 # v6.0.2
      with:
        # fetching all tags is required for the Makefile to compute the right version
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Go
      uses: chainguard-actions/actions-setup-go@a5e8c9530cdd8d86c8c1e22fe4e2d0668896f7c7 # v6.5.0
      with:
        go-version: "1.20"
        cache: false

    - name: Set up QEMU dependency
      uses: chainguard-actions/docker-setup-qemu-action@be526888acc63b74559c57bb8b34a420f2a24670 # v4.1.0

    - name: Set up Docker Buildx
      uses: chainguard-actions/docker-setup-buildx-action@b6beb8a80a92c55017146dc002f047479d776a98 # v4.1.0

    - name: Login to Docker Hub
      uses: chainguard-actions/docker-login-action@2ec1a61ac7d5854002f4e3df1f32cc1d02994f76 # v4.2.0
      if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Share cache with other actions
      uses: chainguard-actions/actions-cache@f3b0db6485760961932c26cc9cf35a6a91a2c63e # v6.1.0
      with:
        path: |
          ~/go/pkg/mod
          /tmp/.buildx-cache
        key: ${{ runner.os }}-build-image-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-build-image-
        lookup-only: true

    - name: Build Docker images
      run: make docker-build

    - name: Push Docker images
      if: github.ref == 'refs/heads/main'
      run: make docker-push

  release:
    name: Release Binaries
    runs-on: ubuntu-latest
    if: startsWith(github.event.ref, 'refs/tags/v')
    needs:
    - tests
    - templates-tests
    - docs-up-to-date
    - build
    - e2e-tests

    steps:
    - name: Checkout
      uses: chainguard-actions/actions-checkout@d1f1061cdaee56aa3a3bc3deb86b67b1db772dd6 # v6.0.2
      with:
        # fetching all tags is required for the Makefile to compute the right version
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Go
      uses: chainguard-actions/actions-setup-go@a5e8c9530cdd8d86c8c1e22fe4e2d0668896f7c7 # v6.5.0
      with:
        go-version: "1.20"
        cache: false

    - name: Share cache with other actions
      uses: chainguard-actions/actions-cache@f3b0db6485760961932c26cc9cf35a6a91a2c63e # v6.1.0
      with:
        path: |
          ~/go/pkg/mod
          /tmp/.buildx-cache
        key: ${{ runner.os }}-build-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-build-
        lookup-only: true

    - name: Import GPG key
      id: import_gpg
      uses: step-security/ghaction-import-gpg@c0b4a334b9b72bfaaebec86ef022a78a5b17f828 # v7.0.0
      with:
        gpg_private_key: ${{ secrets.GPG_KEY }}
        passphrase: ${{ secrets.GPG_PASSWORD }}

    - name: Build binaries
      run: make build

    - name: Release binaries
      env:
        GITHUB_TOKEN: ${{ secrets.REPOSITORIES_ACCESS_TOKEN }}
        GPG_PASSWORD: ${{ secrets.GPG_PASSWORD }}
        GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
      run: make release

  release-image:
    name: Release Docker Image
    runs-on: ubuntu-latest
    if: startsWith(github.event.ref, 'refs/tags/v')
    needs:
    - tests
    - docs-up-to-date
    - build-image
    - e2e-tests

    steps:
    - name: Checkout
      uses: chainguard-actions/actions-checkout@d1f1061cdaee56aa3a3bc3deb86b67b1db772dd6 # v6.0.2
      with:
        # fetching all tags is required for the Makefile to compute the right version
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Go
      uses: chainguard-actions/actions-setup-go@a5e8c9530cdd8d86c8c1e22fe4e2d0668896f7c7 # v6.5.0
      with:
        go-version: "1.20"
        cache: false

    - name: Set up QEMU dependency
      uses: chainguard-actions/docker-setup-qemu-action@be526888acc63b74559c57bb8b34a420f2a24670 # v4.1.0

    - name: Set up Docker Buildx
      uses: chainguard-actions/docker-setup-buildx-action@b6beb8a80a92c55017146dc002f047479d776a98 # v4.1.0

    - name: Login to Docker Hub
      uses: chainguard-actions/docker-login-action@2ec1a61ac7d5854002f4e3df1f32cc1d02994f76 # v4.2.0
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Share cache with other actions
      uses: chainguard-actions/actions-cache@f3b0db6485760961932c26cc9cf35a6a91a2c63e # v6.1.0
      with:
        path: |
          ~/go/pkg/mod
          /tmp/.buildx-cache
        key: ${{ runner.os }}-build-image-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-build-image-
        lookup-only: true

    - name: Build Docker images
      run: make docker-build

    - name: Release Docker images
      run: make docker-push
